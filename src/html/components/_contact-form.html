<form action="#" class="form contact__form">

    <input
        type="text"
        class="form__input"
        placeholder="Your name"
        required
    >

    <input
        type="email"
        class="form__input"
        placeholder="Your email"
        required
    >

    <textarea
        class="form__input form__textarea"
        placeholder="Your message"
        required
    ></textarea>

   <button
    type="submit"
    class="button button--primary button--sm"
>
    Submit
</button>

</form>
